server {
    listen 80;
    server_name blue-plan1.cn www.blue-plan1.cn 120.27.139.123;

    # 官网静态文件
    location / {
        root /var/www/blueplan-website;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # 隐私政策和用户协议
    location /privacy.html {
        root /var/www/blueplan-website;
        try_files $uri =404;
    }

    location /terms.html {
        root /var/www/blueplan-website;
        try_files $uri =404;
    }

    # 应用APK下载
    location /app-release.apk {
        root /var/www/blueplan-website;
        add_header Content-Disposition "attachment; filename=app-release.apk";
    }

    # 后端API - 所有 /api 开头的请求
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 支付宝相关
    location /alipay {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 验证码接口
    location /send-verification-code {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /verify-code {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 支付宝回调
    location /alipay-notify {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
